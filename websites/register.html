<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTech - Register</title>
  <style>

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --accent: #00e5a0;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --border: #1e1e2e;
    }

    * { margin: 1; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2.0rem;
      font-weight: 850;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 460px;
    }

    .card-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .card-header .icon {
      width: 52px;
      height: 52px;
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin: 0 auto 1.2rem;
    }

    .card-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .card-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }

    input::placeholder {
      color: var(--muted);
    }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.4rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 50%;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
      flex-shrink: 0;
    }

    .radio-option input[type="radio"]:checked {
      border-color: var(--accent);
      background: radial-gradient(circle at center, var(--accent) 40%, var(--bg) 45%);
    }

    .radio-option span {
      font-size: 0.9rem;
      color: var(--text);
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-submit:hover {
      background: #00ffb2;
      transform: translateY(-1px);
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">XTECH</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="active">Register</a></li>
    </ul>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <div class="icon">✨</div>
        <h1>Create Account</h1>
        <p>Join XTech and get started today</p>
      </div>

      <form action="#" method="post">

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            required
          />
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input
            type="password"
            id="reg-password"
            name="password"
            placeholder="Create a strong password"
            required
          />
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="gender" value="male" required />
              <span>Male</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="female" />
              <span>Female</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="other" />
              <span>Prefer not to say</span>
            </label>
          </div>
        </div>

        <input type="submit" class="btn-submit" value="Create Account" />

      </form>

      <div class="footer-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 XTech Ltd. All rights reserved.
  </footer>

</body>
</html>
